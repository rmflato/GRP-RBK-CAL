<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LH Rebooking Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f18;--card:#131929;--surface:#1a2236;--border:#263048;--border-hi:#3a4f72;--accent:#f5c518;--accent-dim:rgba(245,197,24,0.1);--accent-glow:rgba(245,197,24,0.25);--text:#dde4f0;--muted:#7a8ca8;--dim:#4a5c78;--success:#34d399;--success-dim:rgba(52,211,153,0.1);--danger:#fb7185;--danger-dim:rgba(251,113,133,0.1);--warn:#f59e0b;--warn-dim:rgba(245,158,11,0.1);--mono:'IBM Plex Mono',monospace;--sans:'Noto Sans KR',sans-serif;--radius:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding-bottom:80px}
header{background:rgba(11,15,24,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);letter-spacing:2px;text-transform:uppercase}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:1px}
.rate-pill{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px 6px 10px}
.rate-dot{width:7px;height:7px;border-radius:50%;background:var(--warn)}
.rate-text{font-family:var(--mono);font-size:12px;color:var(--text)}
.rate-input{width:68px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:12px;text-align:center}
.rate-input:focus{outline:none;border-color:var(--accent)}
.wrap{position:relative;z-index:1;max-width:1160px;margin:0 auto;padding:28px}
.section-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.inputs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.input-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s;display:flex;flex-direction:column}
.input-card:focus-within{border-color:var(--border-hi);box-shadow:0 0 0 3px var(--accent-dim)}
.ic-header{background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px}
.ic-num{width:22px;height:22px;background:var(--accent);color:#0b0f18;font-family:var(--mono);font-size:11px;font-weight:700;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ic-clear{margin-left:auto;background:none;border:none;color:var(--dim);font-size:11px;cursor:pointer;padding:2px 6px;border-radius:4px;font-family:var(--mono);transition:color .15s,background .15s;letter-spacing:.3px}
.ic-clear:hover{color:var(--danger);background:var(--danger-dim)}
.ic-title{font-size:13px;font-weight:600;line-height:1.3}
.ic-sub{font-size:10.5px;color:var(--muted);margin-top:1px}
.input-card textarea{width:100%;flex:1;background:transparent;border:none;color:var(--text);padding:12px 14px;font-family:var(--mono);font-size:11px;line-height:1.8;resize:vertical;min-height:200px}
.input-card textarea:focus{outline:none}
.input-card textarea::placeholder{color:var(--dim)}
.calc-btn{width:100%;background:var(--accent);color:#0b0f18;border:none;border-radius:var(--radius);padding:15px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;margin-bottom:28px;transition:opacity .2s,transform .1s;box-shadow:0 4px 20px var(--accent-glow)}
.calc-btn:hover{opacity:.9}.calc-btn:active{transform:scale(.995)}
.banner{border-radius:var(--radius);padding:14px 20px;margin-bottom:16px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:12px}
.banner.ok{background:var(--success-dim);border:1px solid rgba(52,211,153,0.3);color:var(--success)}
.banner.fail{background:var(--danger-dim);border:1px solid rgba(251,113,133,0.3);color:var(--danger)}
.results-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.card-title{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.fare-tbl{width:100%;border-collapse:collapse}
.fare-tbl th{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);font-weight:400;text-align:right;padding:0 8px 8px}
.fare-tbl th:first-child{text-align:left}
.fare-tbl td{font-family:var(--mono);font-size:13px;padding:10px 8px;border-top:1px solid rgba(255,255,255,0.04);text-align:right}
.fare-tbl td:first-child{text-align:left;color:var(--muted);font-size:11px;letter-spacing:1px}
.fare-tbl .nv{color:var(--accent);font-size:14px;font-weight:600}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:4px;font-size:10.5px;font-family:var(--mono)}
.chip.ok{background:var(--success-dim);color:var(--success);border:1px solid rgba(52,211,153,0.25)}
.chip.fail{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(251,113,133,0.25)}
.divider{height:1px;background:var(--border);margin:12px 0}
.ir{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);gap:12px}
.ir:last-child{border-bottom:none}
.il{color:var(--muted);font-size:11.5px;flex-shrink:0}
.iv{font-family:var(--mono);font-size:12.5px;text-align:right}
.iv.hi{color:var(--accent);font-size:14px;font-weight:600}
.remark-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.remark-grid{display:grid;gap:8px}
.rr{display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:11px 14px;transition:border-color .2s}
.rr:hover{border-color:var(--border-hi)}
.rk{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--accent);text-align:center}
.rv{font-family:var(--mono);font-size:13px;color:var(--text);word-break:break-all;line-height:1.5}
.rd{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.3px}
.rr-j{align-items:start}
.jw{display:flex;gap:24px;flex-wrap:wrap}
.ji .jl{font-size:9.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-family:var(--mono)}
.ji .jv{font-family:var(--mono);font-size:13px}
.ji .jv.ttl{color:var(--accent);font-size:16px;font-weight:700}
.jb{display:flex;flex-direction:column;gap:5px;align-self:start;margin-top:2px}
.cb{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-family:var(--sans);transition:all .2s;white-space:nowrap}
.cb:hover{border-color:var(--accent);color:var(--accent)}
.cb.done{border-color:var(--success);color:var(--success)}
.error-card{background:var(--danger-dim);border:1px solid rgba(251,113,133,0.3);border-radius:var(--radius);padding:18px 22px;margin-bottom:14px}
.error-title{color:var(--danger);font-weight:700;font-size:14px;margin-bottom:10px}
.error-list{list-style:none}
.error-list li{color:var(--danger);font-size:13px;padding:4px 0 4px 16px;position:relative}
.error-list li::before{content:'\2192';position:absolute;left:0;color:var(--danger)}
.manual-card{background:var(--card);border:1px solid var(--warn);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px}
.manual-warn{background:var(--warn-dim);border:1px solid rgba(245,158,11,0.35);border-radius:6px;padding:9px 14px;color:var(--warn);font-size:12px;margin-bottom:14px}
.manual-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.manual-field label{display:block;font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;margin-bottom:4px}
.manual-field input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:5px;font-family:var(--mono);font-size:12px}
.manual-field input:focus{outline:none;border-color:var(--warn)}
.mrow{display:grid;grid-template-columns:80px 1fr 1fr 1fr;gap:10px;align-items:end;margin-bottom:8px}
.mrow-label{font-size:12px;color:var(--muted);padding-top:20px;font-weight:600}
.recalc-btn{background:var(--warn);color:#000;border:none;padding:10px 20px;border-radius:7px;font-weight:700;font-size:13px;cursor:pointer;margin-top:14px;width:100%}
.recalc-btn:hover{opacity:.88}
.debug-toggle{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-family:var(--mono);margin-top:12px;transition:all .2s}
.debug-toggle:hover{border-color:var(--border-hi);color:var(--text)}
.debug-box{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:7px;padding:14px;margin-top:8px;font-family:var(--mono);font-size:11px;color:var(--muted);white-space:pre-wrap;line-height:1.7;display:none}
@media(max-width:960px){.inputs-grid{grid-template-columns:1fr}.results-row{grid-template-columns:1fr}}
/* ── HISTORY ── */
.hist-section{margin-top:36px}
.hist-empty{text-align:center;color:var(--dim);font-size:13px;padding:28px;font-family:var(--mono)}
.hist-list{display:grid;gap:10px}
.hist-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px;transition:border-color .2s;cursor:default}
.hist-item:hover{border-color:var(--border-hi)}
.hist-item.ok-item{border-left:3px solid var(--success)}
.hist-item.fail-item{border-left:3px solid var(--danger)}
.hist-meta{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.hist-time{font-family:var(--mono);font-size:11px;color:var(--muted)}
.hist-badge{font-size:10.5px;font-family:var(--mono);padding:2px 8px;border-radius:4px}
.hist-badge.ok{background:var(--success-dim);color:var(--success);border:1px solid rgba(52,211,153,0.25)}
.hist-badge.fail{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(251,113,133,0.25)}
.hist-flights{font-family:var(--mono);font-size:13px;color:var(--text);margin-bottom:4px}
.hist-ttl{font-family:var(--mono);font-size:11px;color:var(--muted)}
.hist-ttl span{color:var(--accent);font-size:13px;font-weight:600}
.hist-btns{display:flex;flex-direction:column;gap:6px}
.hist-load{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:5px;cursor:pointer;font-size:11px;font-family:var(--sans);transition:all .2s;white-space:nowrap}
.hist-load:hover{border-color:var(--accent);color:var(--accent)}
.hist-del{background:transparent;border:1px solid transparent;color:var(--dim);padding:6px 14px;border-radius:5px;cursor:pointer;font-size:11px;font-family:var(--sans);transition:all .2s;white-space:nowrap}
.hist-del:hover{border-color:rgba(251,113,133,0.3);color:var(--danger)}
.save-btn{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--sans);transition:all .2s;margin-top:14px}
.save-btn:hover{border-color:var(--success);color:var(--success)}
.save-btn.saved{border-color:var(--success);color:var(--success)}
@media(max-width:640px){.wrap{padding:16px}header{padding:0 16px}}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">&#9992;</div><div><div class="logo-text">Rebooking Calculator</div><div class="logo-sub">Lufthansa Group &middot; Korea Market</div></div></div>
  <div class="rate-pill"><div class="rate-dot"></div><span class="rate-text">EUR/KRW:</span><input type="number" class="rate-input" id="rateInput" value="1750" oninput="setRate(this.value)"><span class="rate-text">KRW</span></div>
</header>
<div class="wrap">
  <div class="section-label">&#51077;&#47141; &mdash; 3&#44032;&#51648; &#53581;&#49828;&#53944;&#47484; &#44033; &#52856;&#50640; &#48537;&#50668;&#45347;&#44592;</div>
  <div class="inputs-grid">
    <div class="input-card"><div class="ic-header"><div class="ic-num">1</div><div><div class="ic-title">일정 (Itinerary)</div><div class="ic-sub">HN·HK·TK·KK 포함 전체 세그먼트</div></div><button class="ic-clear" onclick="clearBox('t1')" title="내용 삭제">✕ 지우기</button></div><textarea id="t1" placeholder="  1  LH 719 Q 26AUG 3 ICNMUC HN20 ..."></textarea></div>
    <div class="input-card"><div class="ic-header"><div class="ic-num">2</div><div><div class="ic-title">기존 금액 (RC Remark)</div><div class="ic-sub">FARE BASE KRW + YQ 원본</div></div><button class="ic-clear" onclick="clearBox('t2')" title="내용 삭제">✕ 지우기</button></div><textarea id="t2" placeholder="27 RC ... FARE VTOBKR6/GR/TOUR ..."></textarea></div>
    <div class="input-card"><div class="ic-header"><div class="ic-num">3</div><div><div class="ic-title">새 일정 TST</div><div class="ic-sub">NUC·ROE·YQ 자동 추출</div></div><button class="ic-clear" onclick="clearBox('t3')" title="내용 삭제">✕ 지우기</button></div><textarea id="t3" placeholder="KRW 1322800 ... ROE1477.717582 ..."></textarea></div>
  </div>
  <button class="calc-btn" onclick="run()">&#128269; 분석 및 계산 시작</button>
  <div id="results"></div>
  <div class="hist-section" id="histSection">
    <div class="section-label">&#128203; &#CD5C;&#ADFC; &#ACC4;&#C0B0; &#AE30;&#B85D; &mdash; &#CD5C;&#B300; 5&#D68C;</div>
    <div id="histList"></div>
  </div>
</div>
<script>
'use strict';
var KR_AP=new Set(['ICN','GMP','SEL','PUS','CJU','TAE','KWJ','RSU','YNY','WJU']);
var BIZ_CLS=new Set(['P','Z','D','C','J']);
var HK_CODES=new Set(['HK','TK','KK','HL','MX','UC','RR','SS']);
var EUR_KRW=1750;

function clearBox(id){var el=document.getElementById(id);if(el){el.value="";el.focus();}}

function setRate(v){var n=parseFloat(v);if(n>100)EUR_KRW=Math.round(n/100)*100;}

function parseItin(text){
  var hn=[],hk=[];
  var MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  var STATUS_RE=/\b(HN|HK|TK|KK|HL|MX|UC|RR|SS)(\d+)/;
  var lines=text.replace(/\r/g,'').split('\n');
  for(var li=0;li<lines.length;li++){
    var line=lines[li];
    var stM=line.match(STATUS_RE);
    if(!stM)continue;
    var status=stM[1]==='HN'?'HN':'HK';
    var before=line.substring(0,line.search(STATUS_RE));
    var allF=Array.from(before.matchAll(/([A-Z]{2})\s{0,3}(\d{2,4})/g));
    var fM=null;
    for(var fi=0;fi<allF.length;fi++){if(!HK_CODES.has(allF[fi][1])&&allF[fi][1]!=='HN'){fM=allF[fi];break;}}
    if(!fM)continue;
    var date='';
    for(var mi=0;mi<MONTHS.length;mi++){
      var dm=line.match(new RegExp('(\\d{1,2}'+MONTHS[mi]+')'));
      if(dm){date=dm[1];break;}
    }
    if(!date)continue;
    var allSix=Array.from(before.matchAll(/([A-Z]{6})/g));
    var route='';
    for(var si=0;si<allSix.length;si++){
      var r=allSix[si][1];
      if(KR_AP.has(r.slice(0,3))||KR_AP.has(r.slice(3,6))){route=r;break;}
    }
    if(!route&&allSix.length>0)route=allSix[0][1];
    if(!route)continue;
    var dir;
    if(KR_AP.has(route.slice(0,3)))dir='OB';
    else if(KR_AP.has(route.slice(3,6)))dir='IB';
    else dir='UNKNOWN';
    var af=before.slice(before.indexOf(fM[0])+fM[0].length);
    var cM=af.match(/\b([A-Z])\b/);
    var obj={flight:fM[1]+fM[2],cls:cM?cM[1]:'',date:date,route:route,dir:dir,sc:stM[1]};
    if(status==='HN')hn.push(obj);else hk.push(obj);
  }
  // 같은 날짜의 연결편은 같은 방향으로 그룹핑
  function fillDir(arr){
    // 1. 날짜별로 방향 결정 (OB/IB 중 하나라도 있으면 그 날짜 전체 확정)
    var dateDir={};
    for(var i=0;i<arr.length;i++){
      if(arr[i].dir!=='UNKNOWN'&&!dateDir[arr[i].date]){
        dateDir[arr[i].date]=arr[i].dir;
      }
    }
    // 2. UNKNOWN인 구간은 같은 날짜의 확정 방향 적용
    for(var i=0;i<arr.length;i++){
      if(arr[i].dir==='UNKNOWN'&&dateDir[arr[i].date]){
        arr[i].dir=dateDir[arr[i].date];
      }
    }
    // 3. 그래도 UNKNOWN인 구간은 앞뒤 구간에서 상속 (fallback)
    var last=null;
    for(var i=0;i<arr.length;i++){if(arr[i].dir!=='UNKNOWN')last=arr[i].dir;else if(last)arr[i].dir=last;}
    last=null;
    for(var i=arr.length-1;i>=0;i--){if(arr[i].dir!=='UNKNOWN')last=arr[i].dir;else if(last)arr[i].dir=last;}
  }
  fillDir(hn);fillDir(hk);
  return {hn:hn,hk:hk};
}

function parseOrigFare(text){
  text=text.replace(/\r/g,'');
  var result={ob:null,ib:null};
  var lines=text.split('\n');
  for(var i=0;i<lines.length;i++){
    var fM=lines[i].match(/FARE\s+([\w]+)\//);
    if(!fM)continue;
    var chunk=lines.slice(i,Math.min(i+8,lines.length)).join(' ');
    var bM=chunk.match(/BASE\s+KRW\s*([\d.]+)/) || chunk.match(/UAL\s+FARE\s+KRW\s*([\d.]+)/) || chunk.match(/FARE\s+KRW\s*([\d.]+)/);
    var qM=chunk.match(/YQ\s+KRW\s*([\d.]+)/);
    if(!bM||!qM)continue;
    var basis=fM[1],base=Math.round(parseFloat(bM[1])),yq=Math.round(parseFloat(qM[1]));
    var routeM=chunk.match(/([A-Z]{3})\s+LH\s+([A-Z]{3})/);
    var dir='ib';
    if(routeM&&KR_AP.has(routeM[1]))dir='ob';
    if(!result[dir])result[dir]={basis:basis,base:base,yq:yq};
  }
  return result;
}

function parseTST(text){
  text=text.replace(/\r/g,'');
  var fbLines=[];
  var fbRe=/([A-Z]{3})\s+LH\s+\w\s+(\w)\s+\d{1,2}[A-Z]{3}\s+([\w]+)\//g;
  var m;
  while((m=fbRe.exec(text))!==null){
    fbLines.push({dest:m[1],cls:m[2],basis:m[3],dir:KR_AP.has(m[1])?'IB':'OB'});
  }
  // NUC pattern A: "SEL LH MUC581.49/-FRA LH SEL313.61"
  var nucM=/([A-Z]{3})\s+LH\s+([A-Z]{3})([\d.]+)\/-([A-Z]{3})\s+LH\s+([A-Z]{3})([\d.]+)/.exec(text);
  var ob_nuc=0,ib_nuc=0;
  if(nucM){
    var s1=KR_AP.has(nucM[1]);
    ob_nuc=parseFloat(s1?nucM[3]:nucM[6]);
    ib_nuc=parseFloat(s1?nucM[6]:nucM[3]);
  }else{
    // Fallback: "LH NCE1593.67" patterns
    var parts=Array.from(text.matchAll(/LH\s+([A-Z]{3})([\d.]+)/g));
    if(parts.length>=2){
      // Determine which is OB vs IB based on destination
      var first=parts[0],last=parts[parts.length-1];
      if(KR_AP.has(last[1])){ib_nuc=parseFloat(last[2]);ob_nuc=parseFloat(first[2]);}
      else{ob_nuc=parseFloat(first[2]);ib_nuc=parseFloat(last[2]);}
    }
  }
  var roeM=/ROE\s*([\d.]+)/.exec(text);
  var yqM=/KRW\s+([\d,]+)\s*[-\u2013]\s*YQ/i.exec(text);
  if(!roeM||!yqM||(!ob_nuc&&!ib_nuc))return null;
  var ob_fb=null,ib_fb=null;
  for(var i=0;i<fbLines.length;i++){if(fbLines[i].dir==='OB'&&!ob_fb)ob_fb=fbLines[i];if(fbLines[i].dir==='IB'&&!ib_fb)ib_fb=fbLines[i];}
  // 모든 fare basis가 같은 방향인 경우: 첫번째=OB, 마지막=IB 할당
  if(!ob_fb&&fbLines.length>=1){ob_fb=fbLines[0];}
  if(!ib_fb&&fbLines.length>=2){ib_fb=fbLines[fbLines.length-1];}
  else if(!ib_fb&&fbLines.length>=1){ib_fb=fbLines[0];}
  return{ob_nuc:ob_nuc,ib_nuc:ib_nuc,roe:parseFloat(roeM[1]),total_yq:parseInt(yqM[1].replace(/,/g,'')),ob_basis:ob_fb?ob_fb.basis:'',ib_basis:ib_fb?ib_fb.basis:'',ib_class:ib_fb?ib_fb.cls:''};
}

function r100(n){return Math.round(n/100)*100;}

function calc(itin,orig,tst,eurRate){
  var ob_base=r100(tst.ob_nuc*tst.roe),ib_base=r100(tst.ib_nuc*tst.roe);
  var yq_half=tst.total_yq/2;
  var cls=(tst.ib_class||'').toUpperCase();
  var is_biz=BIZ_CLS.has(cls);
  var eur_tax=is_biz?30:10;
  var envRate=Math.round(eurRate/100)*100;
  var env_krw=eur_tax*envRate;
  var ob_yq=yq_half,ib_yq=yq_half+env_krw;
  var ttl_fare=ob_base+ib_base,ttl_yq=ob_yq+ib_yq,ttl=ttl_fare+ttl_yq;
  var ob_ok=(ob_base+ob_yq)>(orig.ob.base+orig.ob.yq);
  var ib_ok=(ib_base+ib_yq)>(orig.ib.base+orig.ib.yq);
  return{ob_base:ob_base,ib_base:ib_base,ob_yq:ob_yq,ib_yq:ib_yq,env_krw:env_krw,eur_tax:eur_tax,is_biz:is_biz,envRate:envRate,ttl_fare:ttl_fare,ttl_yq:ttl_yq,ttl:ttl,ob_ok:ob_ok,ib_ok:ib_ok,all_ok:ob_ok&&ib_ok};
}

function validate(itin,orig,tst){
  var e=[];
  if(!itin.hn.length)e.push('일정 ①에서 HN(새 요청 편명)을 찾을 수 없습니다.');
  if(!itin.hk.length)e.push('일정 ①에서 HK/TK/KK(기존 확정 편명)을 찾을 수 없습니다.');
  if(!orig.ob)e.push('기존 금액 ②에서 OB(한국→유럽) 요금을 찾을 수 없습니다.');
  if(!orig.ib)e.push('기존 금액 ②에서 IB(유럽→한국) 요금을 찾을 수 없습니다.');
  if(!tst)e.push('TST ③에서 NUC / ROE / YQ를 찾을 수 없습니다.');
  else{
    if(!tst.ob_basis)e.push('TST ③에서 OB FARE BASIS를 찾을 수 없습니다.');
    if(!tst.ib_basis)e.push('TST ③에서 IB FARE BASIS를 찾을 수 없습니다.');
    if(!tst.ib_class)e.push('TST ③에서 IB Booking Class를 찾을 수 없습니다.');
  }
  return e;
}

function run(){
  var t1=document.getElementById('t1').value.trim();
  var t2=document.getElementById('t2').value.trim();
  var t3=document.getElementById('t3').value.trim();
  var res=document.getElementById('results');
  if(!t1||!t2||!t3){alert('3가지 정보를 모두 입력해주세요.');return;}
  var itin=parseItin(t1);
  var orig=parseOrigFare(t2);
  var tst=parseTST(t3);
  window._li=itin;window._lo=orig;window._lt=tst;
  var errs=validate(itin,orig,tst);
  if(errs.length){
    res.style.display='block';
    res.innerHTML=renderManual(errs,itin,orig,tst);
    return;
  }
  var c=calc(itin,orig,tst,EUR_KRW);
  res.style.display='block';
  res.innerHTML=renderResults(itin,orig,tst,c);
}

function runManual(){
  var itin=window._li;
  var g=function(id){var el=document.getElementById(id);return el?el.value:'';};
  var orig={
    ob:{basis:g('m_ob_basis'),base:parseInt(g('m_ob_base'))||0,yq:parseInt(g('m_ob_yq'))||0},
    ib:{basis:g('m_ib_basis'),base:parseInt(g('m_ib_base'))||0,yq:parseInt(g('m_ib_yq'))||0}
  };
  var tst={
    ob_nuc:parseFloat(g('m_ob_nuc'))||0,ib_nuc:parseFloat(g('m_ib_nuc'))||0,
    ob_basis:g('m_ob_tb')||(window._lt?window._lt.ob_basis:''),
    ib_basis:g('m_ib_tb')||(window._lt?window._lt.ib_basis:''),
    ib_class:(g('m_ib_cls')||(window._lt?window._lt.ib_class:'')).toUpperCase(),
    roe:parseFloat(g('m_roe'))||0,total_yq:parseInt(g('m_yq'))||0
  };
  if(!orig.ob.base||!orig.ib.base){alert('OB/IB 기존 금액을 입력해주세요.');return;}
  if(!tst.ob_nuc||!tst.ib_nuc){alert('OB/IB NUC 값을 입력해주세요.');return;}
  if(!tst.roe){alert('ROE 값을 입력해주세요.');return;}
  if(!tst.total_yq){alert('Total YQ 값을 입력해주세요.');return;}
  if(!tst.ib_class){alert('IB Booking Class를 입력해주세요.');return;}
  var c=calc(itin,orig,tst,EUR_KRW);
  document.getElementById('results').innerHTML=renderResults(itin,orig,tst,c);
}

function renderManual(errs,itin,orig,tst){
  var needO=!orig.ob||!orig.ib;
  var needT=!tst;
  var h='<div class="error-card"><div class="error-title">&#9888;&#65039; 자동 파싱 실패 — 수동으로 값을 입력해주세요</div><ul class="error-list">';
  for(var i=0;i<errs.length;i++)h+='<li>'+errs[i]+'</li>';
  h+='</ul></div>';
  if(needO){
    h+='<div class="manual-card"><div class="card-title">② 기존 금액 수동 입력</div>';
    h+='<div class="manual-warn">⚠ 섹션 ②에서 자동 추출 실패</div>';
    h+='<div class="mrow"><div></div><div style="font-size:10px;color:var(--muted);font-family:var(--mono)">FARE BASIS</div><div style="font-size:10px;color:var(--muted);font-family:var(--mono)">BASE KRW</div><div style="font-size:10px;color:var(--muted);font-family:var(--mono)">YQ KRW</div></div>';
    h+='<div class="mrow"><div class="mrow-label">OB</div><div class="manual-field"><input id="m_ob_basis" placeholder="VTOBKR6" value="'+(orig.ob?orig.ob.basis:'')+'"></div><div class="manual-field"><input id="m_ob_base" type="number" placeholder="722800" value="'+(orig.ob?orig.ob.base:'')+'"></div><div class="manual-field"><input id="m_ob_yq" type="number" placeholder="306200" value="'+(orig.ob?orig.ob.yq:'')+'"></div></div>';
    h+='<div class="mrow"><div class="mrow-label">IB</div><div class="manual-field"><input id="m_ib_basis" placeholder="WTOBKR6" value="'+(orig.ib?orig.ib.basis:'')+'"></div><div class="manual-field"><input id="m_ib_base" type="number" placeholder="452400" value="'+(orig.ib?orig.ib.base:'')+'"></div><div class="manual-field"><input id="m_ib_yq" type="number" placeholder="323200" value="'+(orig.ib?orig.ib.yq:'')+'"></div></div>';
    h+='</div>';
  }
  if(needT){
    h+='<div class="manual-card"><div class="card-title">③ 새 TST 수동 입력</div>';
    h+='<div class="manual-warn">⚠ 섹션 ③에서 자동 추출 실패</div>';
    h+='<div class="manual-grid">';
    h+='<div class="manual-field"><label>OB NUC</label><input id="m_ob_nuc" placeholder="581.49"></div>';
    h+='<div class="manual-field"><label>OB FARE BASIS</label><input id="m_ob_tb" placeholder="QTOBKR6"></div>';
    h+='<div class="manual-field"><label>IB NUC</label><input id="m_ib_nuc" placeholder="313.61"></div>';
    h+='<div class="manual-field"><label>IB FARE BASIS</label><input id="m_ib_tb" placeholder="WTOBKR6"></div>';
    h+='<div class="manual-field"><label>IB CLASS</label><input id="m_ib_cls" placeholder="W" maxlength="1" style="text-transform:uppercase"></div>';
    h+='<div class="manual-field"><label>ROE</label><input id="m_roe" placeholder="1477.717582"></div>';
    h+='<div class="manual-field"><label>TOTAL YQ (KRW)</label><input id="m_yq" type="number" placeholder="627000"></div>';
    h+='</div></div>';
  }
  h+='<button class="recalc-btn" onclick="runManual()">&#10004; 위 값으로 계산 실행</button>';
  h+='<button class="debug-toggle" onclick="toggleDebug()" style="margin-top:8px">&#9654; 파싱 디버그</button>';
  h+='<div class="debug-box" id="dbg">'+JSON.stringify({itin:itin,orig:orig,tst:tst},null,2)+'</div>';
  return h;
}

function renderResults(itin,orig,tst,c){
  function fmtF(arr){
    if(!arr.length)return '';
    if(arr.length===1)return arr[0].flight+'/'+arr[0].date;
    return arr.map(function(f){return f.flight;}).join(' ')+'/'+arr[0].date;
  }
  var hn_ob=itin.hn.filter(function(f){return f.dir==='OB';});
  var hn_ib=itin.hn.filter(function(f){return f.dir==='IB';});
  var hk_obs=itin.hk.filter(function(f){return f.dir==='OB';});
  var hk_ibs=itin.hk.filter(function(f){return f.dir==='IB';});
  // HN이 없으면 기존(HK/TK/KK) 편명 사용
  var obF=hn_ob.length?fmtF(hn_ob):fmtF(hk_obs);
  var ibF=hn_ib.length?fmtF(hn_ib):fmtF(hk_ibs);
  var rB=obF,rC=tst.ob_basis+'/GR KRW'+c.ob_base+' YQ KRW'+c.ob_yq;
  var rE=ibF,rF=tst.ib_basis+'/GR KRW'+c.ib_base+' YQ KRW'+c.ib_yq;
  var rJ1='KRW'+c.ttl_fare,rJ2='KRW'+c.ttl_yq,rJ3='KRW'+c.ttl;
  function F(n){return 'KRW '+Number(n).toLocaleString('ko-KR');}
  function CH(ok){return ok?'<span class="chip ok">&#9650; 가능</span>':'<span class="chip fail">&#9660; 불가</span>';}
  var h='';
  if(c.all_ok)h+='<div class="banner ok">&#10004; 변경 가능 — OB / IB 모두 새 요금(BASE+YQ)이 기존보다 높습니다</div>';
  else h+='<div class="banner fail">&#9940; 변경 불가 — '+(!c.ob_ok?'OB ':'')+(!c.ib_ok?'IB ':'')+'구간 새 요금이 기존보다 낮거나 같습니다</div>';
  h+='<div class="results-row"><div class="card"><div class="card-title">요금 비교 (BASE+YQ 합산 기준)</div>';
  h+='<table class="fare-tbl"><thead><tr><th>구간</th><th>기존 BASE+YQ</th><th>새 BASE</th><th>새 YQ</th><th>새 합계</th><th></th></tr></thead><tbody>';
  h+='<tr><td>OB</td><td>'+F(orig.ob.base+orig.ob.yq)+'</td><td>'+F(c.ob_base)+'</td><td>'+F(c.ob_yq)+'</td><td class="nv">'+F(c.ob_base+c.ob_yq)+'</td><td>'+CH(c.ob_ok)+'</td></tr>';
  h+='<tr><td>IB</td><td>'+F(orig.ib.base+orig.ib.yq)+'</td><td>'+F(c.ib_base)+'</td><td>'+F(c.ib_yq)+'</td><td class="nv">'+F(c.ib_base+c.ib_yq)+'</td><td>'+CH(c.ib_ok)+'</td></tr>';
  h+='</tbody></table><div class="divider"></div>';
  h+='<div class="ir"><span class="il">TTL BASE</span><span class="iv">'+F(c.ttl_fare)+'</span></div>';
  h+='<div class="ir"><span class="il">TTL YQ/YR</span><span class="iv">'+F(c.ttl_yq)+'</span></div>';
  h+='<div class="ir"><span class="il" style="font-weight:600">최종 합계</span><span class="iv hi">'+F(c.ttl)+'</span></div></div>';
  h+='<div class="card"><div class="card-title">계산 상세</div>';
  h+='<div class="ir"><span class="il">적용 환율 (100원 반올림)</span><span class="iv">1 EUR = '+EUR_KRW.toLocaleString()+' KRW</span></div>';
  h+='<div class="ir"><span class="il">OB BASE NUC '+tst.ob_nuc+' × ROE '+tst.roe.toFixed(3)+'</span><span class="iv">= '+F(c.ob_base)+'</span></div>';
  h+='<div class="ir"><span class="il">IB BASE NUC '+tst.ib_nuc+' × ROE '+tst.roe.toFixed(3)+'</span><span class="iv">= '+F(c.ib_base)+'</span></div>';
  h+='<div class="ir"><span class="il">YQ (공통) '+F(tst.total_yq)+' ÷ 2</span><span class="iv">= '+F(c.ob_yq)+'</span></div>';
  h+='<div class="ir"><span class="il">환경세 (IB) '+(c.is_biz?'비즈':'이코')+' '+tst.ib_class+' → EUR'+c.eur_tax+' × '+c.envRate.toLocaleString()+'</span><span class="iv">= '+F(c.env_krw)+'</span></div>';
  h+='<div class="ir" style="background:var(--accent-dim);margin:4px -4px;padding:8px 10px;border-radius:5px;border-bottom:none"><span class="il">IB YQ 합계 '+F(c.ob_yq)+' + '+F(c.env_krw)+'</span><span class="iv" style="color:var(--accent)">= '+F(c.ib_yq)+'</span></div>';
  h+='</div></div>';
  // REMARK
  h+='<div class="remark-card"><div class="card-title">REBOOKING REQUEST — 생성된 REMARK</div><div class="remark-grid">';
  if(rB)h+=RR('B',rB,'DIRECTION 1 · OB');
  else h+='<div class="rr" style="border-color:var(--danger)"><div class="rk" style="color:var(--danger)">B</div><div><div style="color:var(--danger);font-size:13px">⚠ HN 편명 인식 실패</div></div></div>';
  h+=RR('C',rC,'FBC/GR · YQ — DIRECTION 1 · OB');
  h+=RR('E',rE,'DIRECTION 2 · IB');
  h+=RR('F',rF,'FBC/GR · YQ — DIRECTION 2 · IB');
  h+='<div class="rr rr-j"><div class="rk">J</div><div><div class="jw"><div class="ji"><div class="jl">TTL FARE</div><div class="jv">'+rJ1+'</div></div><div class="ji"><div class="jl">PLUS YQ/YR</div><div class="jv">'+rJ2+'</div></div><div class="ji"><div class="jl">TTL</div><div class="jv ttl">'+rJ3+'</div></div></div><div class="rd" style="margin-top:6px">CURR AMOUNTS FOR TTL FARE · TTL YQ/YR · SUM TTL FARE + TTL YQ/YR</div></div>';
  h+='<div class="jb"><button class="cb" onclick="cp(this,\''+rJ1+'\')">TTL FARE 복사</button><button class="cb" onclick="cp(this,\''+rJ2+'\')">YQ/YR 복사</button><button class="cb" onclick="cp(this,\''+rJ3+'\')">TTL 복사</button></div></div>';
  h+='</div>';
  h+='<div style="display:flex;gap:10px;align-items:center;margin-top:14px"><button class="save-btn" id="saveBtn" onclick="saveRecord()">&#128190; 이 계산 저장</button></div>';
  h+='<button class="debug-toggle" onclick="toggleDebug()">&#9654; 파싱 디버그</button>';
  h+='<div class="debug-box" id="dbg">'+JSON.stringify({itin:itin,orig:orig,tst:tst,calc:{ob_base:c.ob_base,ib_base:c.ib_base,ob_yq:c.ob_yq,ib_yq:c.ib_yq,env:c.env_krw,ttl:c.ttl}},null,2)+'</div>';
  h+='</div>';
  return h;
}

function RR(key,val,desc){
  var sv=val.replace(/'/g,"\\'");
  return '<div class="rr"><div class="rk">'+key+'</div><div><div class="rv">'+val+'</div><div class="rd">'+desc+'</div></div><button class="cb" onclick="cp(this,\''+sv+'\')">복사</button></div>';
}

function cp(btn,text){
  try{navigator.clipboard.writeText(text);}
  catch(e){var t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);}
  var old=btn.textContent;btn.textContent='✓ 완료';btn.classList.add('done');
  setTimeout(function(){btn.textContent=old;btn.classList.remove('done');},2000);
}

function toggleDebug(){
  var b=document.getElementById('dbg');
  b.style.display=b.style.display==='block'?'none':'block';
}

/* ═══ HISTORY ═══ */
var HIST_KEY='lh_rebooking_history';
var MAX_HIST=5;

function loadHistory(){
  try{return JSON.parse(localStorage.getItem(HIST_KEY)||'[]');}
  catch(e){return [];}
}

function saveHistory(arr){
  try{localStorage.setItem(HIST_KEY,JSON.stringify(arr));}
  catch(e){}
}

function saveRecord(){
  var itin=window._li,orig=window._lo,tst=window._lt;
  var t1=document.getElementById('t1').value.trim();
  var t2=document.getElementById('t2').value.trim();
  var t3=document.getElementById('t3').value.trim();
  if(!itin||!orig||!tst){return;}
  var c=calc(itin,orig,tst,EUR_KRW);
  // 리마크 값
  function fmtF(arr){if(!arr.length)return '';if(arr.length===1)return arr[0].flight+'/'+arr[0].date;return arr.map(function(f){return f.flight;}).join(' ')+'/'+arr[0].date;}
  var hn_ob=itin.hn.filter(function(f){return f.dir==='OB';});
  var hn_ib=itin.hn.filter(function(f){return f.dir==='IB';});
  var hk_obs=itin.hk.filter(function(f){return f.dir==='OB';});
  var hk_ibs=itin.hk.filter(function(f){return f.dir==='IB';});
  var obF=hn_ob.length?fmtF(hn_ob):fmtF(hk_obs);
  var ibF=hn_ib.length?fmtF(hn_ib):fmtF(hk_ibs);
  var record={
    id: Date.now(),
    time: new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),
    all_ok: c.all_ok,
    rB: obF,
    rE: ibF,
    rC: tst.ob_basis+'/GR KRW'+c.ob_base+' YQ KRW'+c.ob_yq,
    rF: tst.ib_basis+'/GR KRW'+c.ib_base+' YQ KRW'+c.ib_yq,
    rJ1:'KRW'+c.ttl_fare, rJ2:'KRW'+c.ttl_yq, rJ3:'KRW'+c.ttl,
    ttl: c.ttl,
    eur: EUR_KRW,
    // 입력칸 복원용
    t1:t1, t2:t2, t3:t3
  };
  var arr=loadHistory();
  arr.unshift(record);
  if(arr.length>MAX_HIST)arr=arr.slice(0,MAX_HIST);
  saveHistory(arr);
  renderHistory();
  // 버튼 상태 변경
  var btn=document.getElementById('saveBtn');
  if(btn){btn.textContent='✓ 저장됨';btn.classList.add('saved');
    setTimeout(function(){btn.textContent='💾 이 계산 저장';btn.classList.remove('saved');},2000);}
}

function deleteRecord(id){
  var arr=loadHistory().filter(function(r){return r.id!==id;});
  saveHistory(arr);
  renderHistory();
}

function restoreRecord(id){
  var arr=loadHistory();
  var rec=null;
  for(var i=0;i<arr.length;i++){if(arr[i].id===id){rec=arr[i];break;}}
  if(!rec)return;
  // 입력칸 복원
  document.getElementById('t1').value=rec.t1;
  document.getElementById('t2').value=rec.t2;
  document.getElementById('t3').value=rec.t3;
  // 환율 복원
  EUR_KRW=rec.eur;
  document.getElementById('rateInput').value=rec.eur;
  // 계산 재실행
  run();
  // 상단으로 스크롤
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderHistory(){
  var arr=loadHistory();
  var el=document.getElementById('histList');
  if(!el)return;
  if(!arr.length){
    el.innerHTML='<div class="hist-empty">저장된 기록이 없습니다</div>';
    return;
  }
  var h='<div class="hist-list">';
  for(var i=0;i<arr.length;i++){
    var r=arr[i];
    var cls=r.all_ok?'ok-item':'fail-item';
    var badge=r.all_ok?'<span class="hist-badge ok">✅ 변경가능</span>':'<span class="hist-badge fail">⛔ 변경불가</span>';
    var ttlF='KRW '+Number(r.ttl).toLocaleString('ko-KR');
    h+='<div class="hist-item '+cls+'">';
    h+='<div>';
    h+='<div class="hist-meta"><span class="hist-time">'+r.time+'</span>'+badge+'</div>';
    h+='<div class="hist-flights">B: '+(r.rB||'-')+'&nbsp;&nbsp;E: '+(r.rE||'-')+'</div>';
    h+='<div class="hist-ttl">TTL: <span>'+ttlF+'</span>&nbsp;·&nbsp;EUR/KRW '+r.eur.toLocaleString()+'</div>';
    h+='</div>';
    h+='<div class="hist-btns">';
    h+='<button class="hist-load" onclick="restoreRecord('+r.id+')">↩ 불러오기</button>';
    h+='<button class="hist-del" onclick="deleteRecord('+r.id+')">삭제</button>';
    h+='</div>';
    h+='</div>';
  }
  h+='</div>';
  el.innerHTML=h;
}

// 페이지 로드 시 기록 표시
renderHistory();
